apiVersion: quay.redhat.com/v1
kind: QuayRegistry
metadata:
  name: registry
  namespace: quay-enterprise
  labels:
    app.kubernetes.io/instance: operator-quay
spec:
    configBundleSecret: config-bundle-secret2
    components:
    - kind: quay
      managed: true
    - kind: postgres
      managed: true
    - kind: clair
      managed: true
      overrides:
        resources:
# Fix stormshift/support#388 - add ephemeral-storage:
          requests:
            ephemeral-storage: "25Gi"
          limits:
            ephemeral-storage: "50Gi"
    - kind: redis
      managed: true
    - kind: horizontalpodautoscaler
      managed: true
    - kind: objectstorage
      managed: false
    - kind: mirror
      managed: true
    - kind: monitoring
      managed: true
    - kind: clairpostgres
      managed: true
    - kind: route
      managed: true
    - kind: tls
      managed: false
