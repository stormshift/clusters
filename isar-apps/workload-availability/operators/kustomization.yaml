apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- namespace.yaml
- operatorgroup.yaml
- subscriptions.yaml
- console-base.yaml
patches:
  - target:
      kind: Console
      name: cluster
      group: operator.openshift.io
      version: v1
    patch: |-
      apiVersion: operator.openshift.io/v1
      kind: Console
      metadata:
        name: cluster
      spec:
        plugins:
          - node-remediation-console-plugin
